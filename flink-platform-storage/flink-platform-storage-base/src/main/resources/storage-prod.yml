storage:
  type: hdfs
  username: hdfs
  storageBasePath: hdfs:///flink-platform/
  localBasePath: data_dir
  properties:
    fs.hdfs.impl: org.apache.hadoop.hdfs.DistributedFileSystem
    fs.defaultFS: hdfs://hacluster
    ha.zookeeper.quorum: node-master3sval.mrs-p69w.com:2181,node-master2rwwb.mrs-p69w.com:2181,node-master1ffsl.mrs-p69w.com:2181
    dfs.client.failover.proxy.provider.hacluster: org.apache.hadoop.hdfs.server.namenode.ha.ConfiguredFailoverProxyProvider
    dfs.ha.automatic-failover.enabled.hacluster: true
    dfs.nameservices: hacluster
    dfs.ha.namenodes.hacluster: 3,4
    dfs.namenode.rpc-address.hacluster.3: node-master2rwwb.mrs-p69w.com:8020
    dfs.namenode.rpc-address.hacluster.4: node-master3sval.mrs-p69w.com:8020
    dfs.namenode.servicerpc-address.hacluster.3: node-master2rwwb.mrs-p69w.com:25006
    dfs.namenode.servicerpc-address.hacluster.4: node-master3sval.mrs-p69w.com:25006
