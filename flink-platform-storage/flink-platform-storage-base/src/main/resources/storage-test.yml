storage:
  type: hdfs
  username: hdfs
  storageBasePath: hdfs:///flink-platform/
  localBasePath: data_dir
  properties:
    fs.hdfs.impl: org.apache.hadoop.hdfs.DistributedFileSystem
    fs.defaultFS: hdfs://nameservice1
    ha.zookeeper.quorum: 172.30.73.155:2181,172.30.73.156:2181,172.30.73.157:2181
    dfs.client.failover.proxy.provider.nameservice1: org.apache.hadoop.hdfs.server.namenode.ha.ConfiguredFailoverProxyProvider
    dfs.ha.automatic-failover.enabled.nameservice1: true
    dfs.nameservices: nameservice1
    dfs.ha.namenodes.nameservice1: namenode84,namenode102
    dfs.namenode.rpc-address.nameservice1.namenode84: 172.30.73.157:8020
    dfs.namenode.rpc-address.nameservice1.namenode102: 172.30.73.159:8020
    dfs.namenode.servicerpc-address.nameservice1.namenode84: 172.30.73.157:8022
    dfs.namenode.servicerpc-address.nameservice1.namenode102: 172.30.73.159:8022
