storage:
  type: hdfs
  username: hdfs
  storageBasePath: hdfs:///flink-platform/
  localBasePath: data_dir
  properties:
    fs.hdfs.impl: org.apache.hadoop.hdfs.DistributedFileSystem
    fs.defaultFS: hdfs://nameservice1
    ha.zookeeper.quorum: v007.alihy.data.tiger:2181,v009.alihy.data.tiger:2181,v023.alihy.data.tiger:2181
    dfs.client.failover.proxy.provider.nameservice1: org.apache.hadoop.hdfs.server.namenode.ha.ConfiguredFailoverProxyProvider
    dfs.ha.automatic-failover.enabled.nameservice1: true
    dfs.nameservices: nameservice1
    dfs.ha.namenodes.nameservice1: namenode112,namenode114
    dfs.namenode.rpc-address.nameservice1.namenode112: v007.alihy.data.tiger:8020
    dfs.namenode.rpc-address.nameservice1.namenode114: v009.alihy.data.tiger:8020
    dfs.namenode.servicerpc-address.nameservice1.namenode112: v007.alihy.data.tiger:8022
    dfs.namenode.servicerpc-address.nameservice1.namenode114: v009.alihy.data.tiger:8022
