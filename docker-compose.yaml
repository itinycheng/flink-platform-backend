services:
  mysql_db:
    image: mysql:8.0.32
    ports:
      - "3306:3306"
    volumes:
      - ./docs/sql/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/mysql:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  minio:
    image: minio/minio:latest
    profiles: ["s3"]
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - ./docker/minio:/data
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # Auto-create the bucket on startup so web does not fail.
  minio_init:
    image: minio/mc:latest
    profiles: ["s3"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing local/datacenter;
      exit 0;
      "

  namenode:
    image: apache/hadoop:3
    profiles: ["hdfs"]
    hostname: namenode
    user: root
    command:
      - /bin/bash
      - -c
      - 'if [ ! -d /tmp/hadoop-root/dfs/name/current ]; then hdfs namenode -format -nonInteractive -force; fi && exec hdfs namenode'
    ports:
      - "9870:9870"   # NameNode Web UI
      - "8020:8020"   # NameNode RPC
    environment:
      CORE-SITE.XML_fs.defaultFS: hdfs://namenode:8020
      HDFS-SITE.XML_dfs.replication: "1"
      HDFS-SITE.XML_dfs.permissions.enabled: "false"
      HDFS-SITE.XML_dfs.namenode.datanode.registration.ip-hostname-check: "false"
    volumes:
      - ./docker/hdfs/name:/tmp/hadoop-root/dfs/name
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9870/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  datanode:
    image: apache/hadoop:3
    profiles: ["hdfs"]
    user: root
    command: ["hdfs", "datanode"]
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      CORE-SITE.XML_fs.defaultFS: hdfs://namenode:8020
      HDFS-SITE.XML_dfs.replication: "1"
      HDFS-SITE.XML_dfs.permissions.enabled: "false"
    volumes:
      - ./docker/hdfs/data:/tmp/hadoop-root/dfs/data

  web:
    build: .
    ports:
      - "9104:9104"
      - "9898:9898"
      - "5005:5005"
    depends_on:
      mysql_db:
        condition: service_healthy
      minio:
        condition: service_healthy
        required: false
      minio_init:
        condition: service_completed_successfully
        required: false
      namenode:
        condition: service_healthy
        required: false
      datanode:
        condition: service_started
        required: false
    environment:
      DB_HOST: mysql_db:3306
      DB_USER: root
      DB_PASSWORD: 123456
      STORAGE_TYPE: ${STORAGE_TYPE:-s3}
      # S3 / MinIO (used when STORAGE_TYPE=s3)
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: http://minio:9000
      # HDFS (used when STORAGE_TYPE=hdfs)
      HDFS_DEFAULT_FS: ${HDFS_DEFAULT_FS:-hdfs://namenode:8020}
      HADOOP_USER_NAME: ${HADOOP_USER_NAME:-root}
