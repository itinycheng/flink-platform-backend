# ============================================================
# Storage selection is driven by Compose profile. .env sets the default;
# the CLI flag overrides it.
#   docker compose up -d                      # uses default from .env
#   docker compose --profile local up -d      # local disk
#   docker compose --profile s3    up -d      # MinIO / S3
#   docker compose --profile hdfs  up -d      # HDFS
# ============================================================

# Reusable web config (x-fields are ignored by Compose at runtime)
x-web-base: &web-base
  build: .
  ports:
    - "9104:9104"
    - "9898:9898"
    - "5005:5005"

x-web-env-common: &web-env-common
  DB_HOST: mysql_db:3306
  DB_USER: ${DEV_USER}
  DB_PASSWORD: ${DEV_PASSWORD}

services:
  # ============================================================
  # Core (always on)
  # ============================================================
  mysql_db:
    image: mysql:8.0.32
    ports:
      - "3306:3306"
    volumes:
      - ./docs/sql/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/mysql:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DEV_PASSWORD}
      MYSQL_DATABASE: platform
      MYSQL_USER: ${DEV_USER}
      MYSQL_PASSWORD: ${DEV_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DEV_USER}", "-p${DEV_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  # ============================================================
  # Local storage  (profile: local)
  # ============================================================
  web-local:
    <<: *web-base
    profiles: ["local"]
    depends_on:
      mysql_db:
        condition: service_healthy
    volumes:
      - ./docker/local:/app/data
    environment:
      <<: *web-env-common
      STORAGE_TYPE: local

  # ============================================================
  # S3 storage  (profile: s3)
  # ============================================================
  minio:
    image: minio/minio:latest
    profiles: ["s3"]
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - ./docker/minio:/data
    restart: always
    environment:
      MINIO_ROOT_USER: ${DEV_USER}
      MINIO_ROOT_PASSWORD: ${DEV_PASSWORD}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # Auto-create the bucket on startup so web does not fail.
  minio_init:
    image: minio/mc:latest
    profiles: ["s3"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${DEV_USER} ${DEV_PASSWORD};
      /usr/bin/mc mb --ignore-existing local/datacenter;
      exit 0;
      "

  web-s3:
    <<: *web-base
    profiles: ["s3"]
    depends_on:
      mysql_db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    environment:
      <<: *web-env-common
      STORAGE_TYPE: s3
      AWS_ACCESS_KEY_ID: ${DEV_USER}
      AWS_SECRET_ACCESS_KEY: ${DEV_PASSWORD}
      S3_ENDPOINT: http://minio:9000

  # ============================================================
  # HDFS storage  (profile: hdfs)
  # ============================================================
  namenode:
    image: apache/hadoop:3
    profiles: ["hdfs"]
    hostname: namenode
    user: root
    command:
      - /bin/bash
      - -c
      - 'if [ ! -d /tmp/hadoop-root/dfs/name/current ]; then hdfs namenode -format -nonInteractive -force; fi && exec hdfs namenode'
    ports:
      - "9870:9870"   # NameNode Web UI
      - "8020:8020"   # NameNode RPC
    environment:
      CORE-SITE.XML_fs.defaultFS: hdfs://namenode:8020
      HDFS-SITE.XML_dfs.replication: "1"
      HDFS-SITE.XML_dfs.permissions.enabled: "false"
      HDFS-SITE.XML_dfs.namenode.datanode.registration.ip-hostname-check: "false"
    volumes:
      - ./docker/hdfs/name:/tmp/hadoop-root/dfs/name
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9870/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  datanode:
    image: apache/hadoop:3
    profiles: ["hdfs"]
    user: root
    command: ["hdfs", "datanode"]
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      CORE-SITE.XML_fs.defaultFS: hdfs://namenode:8020
      HDFS-SITE.XML_dfs.replication: "1"
      HDFS-SITE.XML_dfs.permissions.enabled: "false"
    volumes:
      - ./docker/hdfs/data:/tmp/hadoop-root/dfs/data

  web-hdfs:
    <<: *web-base
    profiles: ["hdfs"]
    depends_on:
      mysql_db:
        condition: service_healthy
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started
    environment:
      <<: *web-env-common
      STORAGE_TYPE: hdfs
      HDFS_DEFAULT_FS: hdfs://namenode:8020
      HADOOP_USER_NAME: root
