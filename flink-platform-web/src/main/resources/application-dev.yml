server:
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 1000
      min-spare: 30
  port: 9104

auth:
  type: local                       # Options: local | cas | oidc
  frontend-url: http://localhost:9528/
  session-ttl: 7d
  cas:
    server-url:                     # CAS server base URL, e.g. https://cas.example.com/cas
    username-path:                  # JSONPath to username in serviceValidate response
    external-id-path:               # JSONPath to external user ID
    email-path:                     # JSONPath to email attribute
  oidc:
    authority:                      # OIDC issuer URL, e.g. https://login.microsoftonline.com/{tenant-id}/v2.0
    client-id:                      # OAuth2 client ID
    client-secret:                  # OAuth2 client secret — use ${OIDC_CLIENT_SECRET} in prod
    scope: openid email profile
    username-claim: preferred_username  # Claim used as local username: "sub" (Google/Casdoor/Okta), "oid" (Entra ID), "preferred_username" (Keycloak)


spring:
  application:
    name: flink-platform-backend
  datasource:
    dynamic:
      # strict: true
      datasource:
        master_platform:
          url: jdbc:mysql://0.0.0.0:3306/platform?allowMultiQueries=true&useUnicode=true&characterEncoding=UTF-8
          username: root
          password: 123456
          driver-class-name: com.mysql.jdbc.Driver
  quartz:
    job-store-type: jdbc
    overwrite-existing-jobs: true
    startup-delay: 5s
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceName: quartzScheduler
            instanceId: AUTO
          jobStore:
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            isClustered: true
            clusterCheckinInterval: 10000
            useProperties: false
            misfireThreshold: 5000
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 100
            threadPriority: 5
            threadsInheritContextClassLoaderOfInitializingThread: true
  grpc:
    server:
      port: 9898
    client:
      default-channel:
        address: static://0.0.0.0:9898
        enableKeepAlive: true
        keepAliveWithoutCalls: true
        negotiationType: plaintext

worker:
  flowExecThreads: 100
  perFlowExecThreads: 5
  maxPerFlowExecThreads: 10
  errorRetries: 3
  reactiveExecThreads: 10
  flinkSubmitTimeoutMills: 300000
  maxShellExecTimeoutMills: 28800000
